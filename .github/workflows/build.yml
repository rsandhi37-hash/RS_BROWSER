name: Build RS Browser
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew assembleDebug
      - name: Rename and Move APK
        run: |
          mkdir build-output
          cp app/build/outputs/apk/debug/app-debug.apk build-output/RS-Browser-v1.apk
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: RS-Browser-Package
          path: build-output/RS-Browser-v1.apk
