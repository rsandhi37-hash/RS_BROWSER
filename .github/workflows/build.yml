name: Build RS Browser

on: 
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get SHA256 Fingerprint
        # Isse build logs mein aapko SHA256 mil jayega (Netlify assetlinks ke liye)
        run: ./gradlew signingReport

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Rename and Move APK
        run: |
          mkdir -p build-output
          # Yeh command kisi bhi sub-folder se APK dhoond nikaalegi
          find . -name "*.apk" -type f -exec cp {} build-output/RS-Browser-v2.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RS-Browser-Package-v2
          path: build-output/RS-Browser-v2.apk

